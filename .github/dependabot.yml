version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: saturday
    commit-message:
      prefix: deps(github-actions)
    labels:
      - dependencies
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: sunday
    commit-message:
      prefix: deps(cargo)
    labels:
      - dependencies
    groups:
      cargo:
        patterns:
          - "*"
